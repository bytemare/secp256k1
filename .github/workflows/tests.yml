name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  Test:
    strategy:
      fail-fast: false
      matrix:
        go: [ '1.23', '1.22', '1.21' ]
    uses: bytemare/workflows/.github/workflows/test-go.yml@ad3ef5e670f9e99e70485df6c83b5296a38f97f3
    with:
      command: cd .github && make test
      version: ${{ matrix.go }}
