name: "CodeQL"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '31 10 * * 0'

permissions: {}

jobs:
  CodeQL:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: bytemare/workflows/.github/workflows/codeql.yml@ad3ef5e670f9e99e70485df6c83b5296a38f97f3
    with:
      language: go
